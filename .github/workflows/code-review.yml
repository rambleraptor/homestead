name: Code Quality & Security

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-code-review:
    runs-on: ubuntu-latest
    name: Claude AI Code Review
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/claude')
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('number', context.issue.number);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}

            This is a modular HomeOS application built with:
            - React 19 + TypeScript + Vite
            - PocketBase backend
            - Module Registry pattern for extensibility
            - Role-Based Access Control (RBAC)

            Please review this pull request and provide feedback on:

            **Code Quality & Architecture:**
            - Adherence to modular architecture pattern (modules should be self-contained)
            - TypeScript type safety and best practices
            - React 19 patterns and hooks usage (no unused React imports needed)
            - Component composition and reusability

            **Security:**
            - Authentication and authorization implementation
            - RBAC permission checks (usePermissions, PermissionGuard)
            - PocketBase API security rules
            - XSS, injection, and other OWASP vulnerabilities
            - Sensitive data handling

            **Module System:**
            - New modules follow the established pattern in src/modules/
            - Module registration in src/modules/registry.ts
            - Proper route definitions and permissions
            - Module-specific types are well-defined

            **Performance & Best Practices:**
            - Efficient React Query usage and caching
            - Proper error handling
            - Loading states and user feedback
            - Accessibility considerations

            **Testing & Documentation:**
            - Code clarity and maintainability
            - Inline documentation where needed
            - Component prop types

            Be constructive and specific. Highlight both strengths and areas for improvement.
            Use the repository's documentation for context on architecture decisions.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
  lint-and-typecheck:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Run TypeScript type check
        run: make type-check

      - name: Run ESLint
        run: make lint

  build-test:
    runs-on: ubuntu-latest
    name: Build and Test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Build application
        run: make build

      - name: Check build output
        working-directory: frontend
        run: |
          echo "Build completed successfully"
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    name: Run Tests
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: make install

      - name: Install migration test dependencies
        working-directory: tests/migrations
        run: npm install

      - name: Run frontend tests
        run: make test

      - name: Run migration tests
        run: make test-migrations

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Run npm audit
        run: make audit || true

      - name: Check for secrets
        run: |
          echo "Checking for exposed secrets..."
          ! grep -r -i "api_key\|secret\|password\|token" frontend/src --include="*.ts" --include="*.tsx" | grep -v "placeholder" | grep -v "example" || echo "Warning: Potential secrets found in code"
