name: CI Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Run CI checks to ensure code quality
  ci-checks:
    runs-on: ubuntu-latest
    name: CI Checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: make install

      - name: Run TypeScript type check
        run: make type-check

      - name: Run ESLint
        run: make lint

      - name: Build application
        run: make build

      - name: Run frontend tests
        run: make test

      - name: CI Summary
        if: success()
        run: |
          echo "✅ All CI checks passed!"
          echo "📌 Commit: ${{ github.sha }}"
          echo "🔀 Branch: ${{ github.ref_name }}"
          echo ""
          echo "Your server can now pull this commit and deploy automatically."
